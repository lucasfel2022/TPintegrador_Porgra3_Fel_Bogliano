<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameZone — Bienvenido</title>
  <link rel="icon" href="img/favicon.png" type="image/png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="alumnos-bar">Alumnos: Lucas Fel &amp; Milagros Bogliano — UTN Avellaneda</div>

  <nav class="navbar">
    <div class="navbar-brand">
      <span class="logo">🎮</span>
      <h1>GameZone</h1>
    </div>
    <div class="navbar-links">
      <a href="admin-redirect.html" class="nav-link">Panel Admin</a>
      <button id="btn-tema" class="btn-tema" title="Cambiar tema">🌙</button>
    </div>
  </nav>

  <main class="bienvenida-wrapper">
    <div class="bienvenida-card">
      <div class="bienvenida-logo">🎮</div>
      <h2>¡Bienvenido a GameZone!</h2>
      <p class="subtitulo">Tu autoservicio de videojuegos y accesorios</p>

      <form id="form-bienvenida" novalidate>
        <div class="form-group">
          <label for="nombre">Ingresá tu nombre para continuar</label>
          <input type="text" id="nombre" name="nombre" placeholder="Ej: Lucas" required minlength="2" autocomplete="off">
          <span class="error-msg" id="error-nombre"></span>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Continuar →</button>
      </form>
    </div>
  </main>

  <footer>GameZone © 2026 — Trabajo Integrador Programación III</footer>

  <script src="app.js"></script>
</body>
</html>
